name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $v = $env:GITHUB_REF.Substring("refs/tags/v".Length)
          } else {
            $v = "0.0.0-dev+$($env:GITHUB_SHA.Substring(0,7))"
          }
          Write-Host "version=$v"
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build whatsmatan.exe (windows/amd64)
        shell: pwsh
        run: |
          $env:GOOS = 'windows'
          $env:GOARCH = 'amd64'
          $env:CGO_ENABLED = '0'
          New-Item -ItemType Directory -Force -Path build | Out-Null
          go build -trimpath -ldflags "-s -w" -o build\whatsmatan.exe .\cmd\whatsmatan

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        env:
          WHATSMATAN_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' /Qp installer\whatsmatan.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: whatsmatan-setup-${{ steps.ver.outputs.version }}
          path: installer\Output\whatsmatan-setup.exe
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer\Output\whatsmatan-setup.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
